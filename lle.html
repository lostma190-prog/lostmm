<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTFA HOSPITAL</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(270deg, #90e0ef, #caf0f8, #ade8f4);
    background-size: 600% 600%;
    animation: gradientMove 10s ease infinite;
}

/* Animated Background */
@keyframes grid-auto-flow:  {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    color:black;
    background: gradientMove (90deg, #0077b6, #00b4d8);
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    animation: fadeIn 2s;
}
/* Navigation */
nav {
    display: flex;
    justify-content: center;
    background: #023e8a;
}

nav a {
    color: white;
    padding: 15px 20px;
    text-decoration: none;
    transition: 0.4s;
}

nav a:hover {
    background: #00b4d8;
    transform: scale(1.1);
}

/* Sections */
section {
    display: none;
    padding: 20px;
    animation: slideUp 0.7s ease;
}

.active {
    display: block;
}

/* Forms */
form {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #0077b6, #00b4d8);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.4s;
}

button:hover {
    transform: scale(1.1);
    background: linear-gradient(45deg, #00b4d8, #0077b6);
}

/* Image Section */
.hero {
    text-align: center;
}

.hero img {
    width: 80%;
    max-width: 500px;
    border-radius: 15px;
    animation: float 3s ease-in-out infinite;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {transform: translateY(50px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

/* Floating Image */
@keyframes float {
    0% {transform: translateY(0px);}
    50% {transform: translateY(-15px);}
    100% {transform: translateY(0px);}
}

</style>
</head>

<body>

<header>
    <h1>MTFA HOSPITAL</h1>
    <p>Your Health, Our Priority</p>
</header>

<nav>
    <a href="#" onclick="showSection('home')">Home</a>
    <a href="#" onclick="showSection('login')">Login</a>
    <a href="#" onclick="showSection('register')">Register</a>
    <a href="#" onclick="showSection('deposit')">Cash Deposit</a>
    <a href="#" onclick="showSection('contact')">Contact Us</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
    <div class="hero">
        <img src="https://images.unsplash.com/photo-1615770922480-0b9ae80afeba?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fGhvc3BpdGFsJTIwYnVpbGRpbmd8ZW58MHx8MHx8fDA%3D" alt="Hospital">
        <img src="https://images.unsplash.com/photo-1580281657702-257584239a55?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGhvc3BpdGFsJTIwcm9vbXxlbnwwfHwwfHx8MA%3D%3D" alt="Hospital">
        <img src="https://plus.unsplash.com/premium_photo-1658506671316-0b293df7c72b?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8ZG9jdG9yfGVufDB8fDB8fHww" alt="Hospital">

<h2>Welcome to MTFA Hospital</h2>
        <p>We provide modern and trusted healthcare services.</p>
    </div>
</section>

<!-- LOGIN -->
<section id="login">
    <h2 style="text-align:center;">Login</h2>
    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button>Login</button>
    </form>
</section>

<!-- REGISTER -->
<section id="register">
    <h2 style="text-align:center;">Registration</h2>
    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
      <input type="text"placeholder="description about your issues"  required>
        <button>Register</button>
    </form>
</section>

<!-- DEPOSIT -->
<section id="deposit">
    <h2 style="text-align:center;">Cash Deposit</h2>
    <form>
        <input type="text" placeholder="Patient Name" required>
        <input type="number" placeholder="Amount" required>
        <input type="text" placeholder="Payment Method" required>
        <button>Submit</button>
    </form>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2 style="text-align:center;">Contact Us</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message"></textarea>
        <button>Send</button>
    </form>
</section>

<script>
function showSection(id) {
    document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
